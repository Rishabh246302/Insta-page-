<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Personalized Message</title>
  <meta name="description" content="Personalized premium compliments with interactive heart and sparkle effects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="compliments-page">
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="theme-bg" aria-hidden="true">
    <div class="wave wave-one"></div>
    <div class="wave wave-two"></div>
    <div class="particle-layer" id="particleLayer"></div>
  </div>

  <main class="page-shell compliment-shell">
    <button class="back-btn" type="button" data-back-home>← Back</button>

    <section class="compliment-panel reveal-in">
      <p class="eyebrow" id="themeEyebrow">Premium compliment drop</p>
      <h1 class="compliment-title" id="greetingMessage">Hey Icon ✨</h1>
      <p class="compliment-subtitle" id="greetingSubtitle">Tap a card. Your ego deserves a tiny vacation.</p>

      <div class="compliments-list" id="complimentsList" aria-live="polite"></div>

      <button class="primary-btn glow-pulse" type="button" data-go-instagram>
        <span>Unlock Final Mystery</span>
        <span>→</span>
      </button>
    </section>
  </main>

  <div class="pop-layer" id="popLayer" aria-hidden="true"></div>
  <div class="page-transition" id="pageTransition" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
