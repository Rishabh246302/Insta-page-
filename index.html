<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Choose Your Vibe — Premium Experience</title>
  <meta name="description" content="Choose your vibe and receive a personalized premium compliment experience." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="cursor-glow" id="cursorGlow" aria-hidden="true"></div>

  <main class="page-shell">
    <section class="hero-panel reveal-in">
      <div class="orb orb-one" aria-hidden="true"></div>
      <div class="orb orb-two" aria-hidden="true"></div>
      <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>
      <div class="stars-layer" aria-hidden="true"></div>

      <p class="eyebrow shimmer-text">✦ Premium Experience ✦</p>
      <h1 class="hero-title">Choose Your Vibe</h1>
      <p class="hero-subtitle">A tiny luxury compliment machine. Pick your energy and let the drama begin.</p>

      <div class="vibe-grid" aria-label="Choose male or female vibe">
        <button class="vibe-card male-card tilt-card" type="button" data-gender="male">
          <span class="card-mini">Bold · Classy · Main Character</span>
          <span class="card-icon">♔</span>
          <span class="card-title">Male</span>
          <span class="card-copy">Sharp energy, cool confidence, royal-level hype.</span>
        </button>

        <button class="vibe-card female-card tilt-card" type="button" data-gender="female">
          <span class="card-mini">Soft · Dreamy · Iconic</span>
          <span class="card-icon">✧</span>
          <span class="card-title">Female</span>
          <span class="card-copy">Glow, grace, sparkle, and a little emotional damage to the algorithm.</span>
        </button>
      </div>

      <p class="home-note">No pressure. Just vibes. And maybe a little mystery 👀</p>
    </section>
  </main>

  <div class="page-transition" id="pageTransition" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
