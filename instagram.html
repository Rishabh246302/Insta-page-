<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Final Mystery 🔮</title>
  <meta name="description" content="Final mysterious Instagram follow page with premium neon effects." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="instagram-page mystery-page">
  <div class="noise-overlay" aria-hidden="true"></div>
  <div class="mystery-bg" aria-hidden="true">
    <canvas id="starCanvas"></canvas>
    <div class="mist mist-a"></div>
    <div class="mist mist-b"></div>
    <div class="emoji-layer" id="emojiLayer"></div>
  </div>

  <main class="page-shell instagram-shell">
    <button class="back-btn" type="button" data-back-compliments>← Back</button>

    <section class="instagram-card reveal-in">
      <div class="profile-wrap">
        <div class="profile-ring">
          <!-- Change profile image here -->
          <img src="https://ui-avatars.com/api/?name=Rishabh+Chauhan&size=240&background=111827&color=ffffff&bold=true" alt="Instagram profile" />
        </div>
        <span class="status-chip"><span></span> mysterious but online</span>
      </div>

      <div class="type-lines" aria-label="Final mystery messages">
        <h1 class="type-line">You made it here 😎</h1>
        <p class="type-line delay-1">Now the real mystery begins…</p>
        <p class="type-line delay-2">Follow me before I disappear 👀</p>
      </div>

      <div class="handle-card">
        <span>Instagram</span>
        <!-- Change Instagram handle here -->
        <strong id="igHandle">@_rishabh_246</strong>
      </div>

      <!-- Change Instagram link here -->
      <a class="follow-btn glow-pulse" href="https://www.instagram.com/_rishabh_246?igsh=dHF6dWoxNG9oOXcy" target="_blank" rel="noopener noreferrer" data-confetti>
        <span>Follow on Instagram</span>
        <span>↗</span>
      </a>

      <p class="warning-copy">Warning: following may increase your vibe by 200%.</p>
      <p class="tiny-copy">Side effects include: sudden confidence, premium aura, and laughing at your own jokes.</p>
    </section>
  </main>

  <div class="page-transition" id="pageTransition" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
